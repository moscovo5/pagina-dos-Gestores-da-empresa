<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acesso aos Sistemas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color:#fff;
}

/* HEADER */
header{
    padding:20px 40px;
}

.logo{
    font-size:1.8em;
    font-weight:600;
}

/* CONTAINER */
.cta{
    text-align:center;
    margin-top:80px;
}

.cta h1{
    margin-bottom:40px;
}

/* CARDS */
.cards-container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.card{
    width:260px;
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition:.3s;
    font-size:1.2em;
    font-weight:500;
    text-decoration:none;
    color:white;
}

.card:hover{
    transform: translateY(-10px) scale(1.05);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header>
    <div class="logo">Sistema da Empresa</div>
</header>

<div class="cta">
    <h1>Acesso aos Departamentos</h1>

    <div class="cards-container">

        <a class="card" href="https://moscovo5.github.io/Painel-De-Financas/">
            Gestão Financeira
        </a>

        <a class="card" href="https://moscovo5.github.io/Painel-De-Recursos-Humanos/">
            Recursos Humanos
        </a>

    </div>
</div>

</body>
</html>
